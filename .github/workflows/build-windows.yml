name: Build Windows EXE

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - master

jobs:
  build-windows:
    name: Build Windows package
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package.json

      - name: Setup uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
          cache-dependency-glob: backend/uv.lock

      - name: Build frontend
        working-directory: frontend
        run: |
          npm install
          npm run build

      - name: Copy frontend assets
        shell: pwsh
        run: |
          if (Test-Path "backend/static") {
            Remove-Item "backend/static" -Recurse -Force
          }
          New-Item -ItemType Directory -Path "backend/static" | Out-Null
          Copy-Item "frontend/dist/*" "backend/static" -Recurse -Force

      - name: Test backend
        working-directory: backend
        run: uv run --extra dev pytest

      - name: Build executable
        working-directory: backend
        run: |
          uv run --extra dev --with pyinstaller pyinstaller `
            --noconfirm `
            --clean `
            --name XiaoTianMedKey `
            --onedir `
            --add-data "static;static" `
            --collect-all pymupdf4llm `
            --collect-data pymupdf `
            "run_app.py"

      - name: Smoke test executable
        shell: pwsh
        run: |
          $out = "backend/dist/XiaoTianMedKey/exe.out.log"
          $err = "backend/dist/XiaoTianMedKey/exe.err.log"
          $proc = Start-Process `
            -FilePath "backend/dist/XiaoTianMedKey/XiaoTianMedKey.exe" `
            -PassThru `
            -RedirectStandardOutput $out `
            -RedirectStandardError $err

          try {
            $ready = $false
            for ($i = 0; $i -lt 30; $i++) {
              Start-Sleep -Seconds 1
              if ($proc.HasExited) {
                break
              }
              try {
                $resp = Invoke-RestMethod -Uri "http://127.0.0.1:8000/health" -TimeoutSec 2
                if ($resp.status -eq "ok") {
                  $ready = $true
                  break
                }
              } catch {
                continue
              }
            }

            if (-not $ready) {
              if (Test-Path $out) {
                Write-Host "=== exe stdout ==="
                Get-Content $out
              }
              if (Test-Path $err) {
                Write-Host "=== exe stderr ==="
                Get-Content $err
              }
              throw "Executable did not become healthy."
            }
          } finally {
            if (-not $proc.HasExited) {
              Stop-Process -Id $proc.Id -Force
            }
          }

      - name: Create release zip
        shell: pwsh
        run: |
          if (Test-Path "XiaoTianMedKey-windows.zip") {
            Remove-Item "XiaoTianMedKey-windows.zip" -Force
          }
          Compress-Archive `
            -Path "backend/dist/XiaoTianMedKey/*" `
            -DestinationPath "XiaoTianMedKey-windows.zip" `
            -Force

      - name: Upload Windows package
        uses: actions/upload-artifact@v4
        with:
          name: XiaoTianMedKey-windows
          path: XiaoTianMedKey-windows.zip
          if-no-files-found: error
